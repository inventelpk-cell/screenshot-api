services:
  screenshot-api:
    build: .
    container_name: screenshot-api
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - RAPIDAPI_PROXY_SECRET=${RAPIDAPI_PROXY_SECRET}
      - MAX_CONCURRENT_PAGES=${MAX_CONCURRENT_PAGES:-5}
      - NAVIGATION_TIMEOUT_MS=${NAVIGATION_TIMEOUT_MS:-30000}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-30}
      - CACHE_MAX_ITEMS=${CACHE_MAX_ITEMS:-200}
      - CACHE_TTL_MS=${CACHE_TTL_MS:-300000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "4"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN
    tmpfs:
      - /tmp:size=512m
    shm_size: "1gb"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
